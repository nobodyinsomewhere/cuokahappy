<!doctype html>
<html lang="zh-CN" data-theme="glass-ice">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tavern Card Generator V3</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="toastWrap" class="toast-wrap"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">卡</div>
        <div class="brand-text">
          <h1>Tavern Card Generator</h1>
          <p>V3 · 角色卡编辑与导出工具</p>
        </div>
      </div>

      <section class="side-panel">
        <div class="side-panel-title">主题</div>
        <label for="themeSelect">界面风格</label>
        <select id="themeSelect">
          <option value="default">默认蓝紫</option>
          <option value="glass-mint">薄荷玻璃</option>
          <option value="glass-ice">冰蓝玻璃</option>
        </select>
      </section>

      <section class="side-panel">
        <div class="side-panel-title">角色管理</div>

        <label for="characterSearch">搜索角色</label>
        <input id="characterSearch" placeholder="输入角色名筛选" />

        <div class="side-actions">
          <button id="newCharacterBtn">新建角色</button>
          <button class="secondary" id="duplicateCharacterBtn">复制当前</button>
        </div>

        <div id="characterList" class="character-list"></div>
      </section>

      <section class="side-panel">
        <div class="side-panel-title">导入导出</div>
        <div class="side-actions vertical">
          <button class="secondary" id="importJsonBtn">导入 JSON</button>
          <button class="secondary" id="exportJsonBtn">导出 JSON</button>
          <button class="secondary" id="importPngBtn">导入 PNG 角色卡</button>
          <button class="secondary" id="exportPngBtn">导出 PNG 角色卡</button>
          <button class="secondary" id="exportPreviewPngBtn">导出卡面 PNG</button>
        </div>

        <input id="jsonFileInput" type="file" accept=".json,application/json" hidden />
        <input id="pngFileInput" type="file" accept="image/png" hidden />
      </section>

      <section class="side-panel">
        <div class="side-panel-title">AI 生成（可选）</div>
        <p class="tiny-text">支持 OpenAI 兼容接口。可以自动补全设定内容。</p>

        <label for="apiBaseUrl">Base URL</label>
        <input id="apiBaseUrl" placeholder="https://example.com/v1" />

        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" placeholder="sk-..." />

        <label for="apiModel">模型名</label>
        <input id="apiModel" placeholder="gpt-4o-mini / deepseek-chat / ..." />

        <div class="side-actions vertical">
          <button class="secondary" id="saveApiConfigBtn">保存 API 配置</button>
          <button class="secondary" id="generateWithAiBtn">AI 补全设定</button>
        </div>
      </section>
    </aside>

    <main class="main">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>角色编辑</h2>
            <p>编辑字段时自动保存，也支持手动保存当前角色。</p>
          </div>
          <div class="header-actions">
            <span id="statusText" class="status-pill">就绪</span>
            <button class="secondary" id="saveCharacterBtn">保存角色</button>
            <button class="secondary" id="fillTemplateBtn">模板补全</button>
            <button class="danger" id="deleteCurrentBtn">删除当前</button>
          </div>
        </div>

        <div class="panel-body">
          <div class="form-grid">
            <div>
              <label for="name">角色名</label>
              <input id="name" placeholder="例如：林雾" />
            </div>

            <div>
              <label for="version">版本</label>
              <input id="version" value="1.0" />
            </div>

            <div>
              <label for="creator">创作者</label>
              <input id="creator" placeholder="Anonymous" />
            </div>

            <div>
              <label for="tags">标签（逗号分隔）</label>
              <input id="tags" placeholder="original, mystery, slowburn" />
            </div>

            <div class="full">
              <label for="summary">一句话简介</label>
              <input id="summary" placeholder="一句话概括角色定位" />
            </div>

            <div>
              <label for="userName">用户占位符</label>
              <input id="userName" value="{{user}}" />
            </div>

            <div>
              <label for="charName">角色占位符</label>
              <input id="charName" value="{{char}}" />
            </div>

            <div class="full">
              <label for="description">角色描述 description</label>
              <textarea id="description" placeholder="外貌、背景、能力、关系倾向..."></textarea>
            </div>

            <div class="full">
              <label for="personality">人格 personality</label>
              <textarea id="personality" placeholder="性格、价值观、说话方式..."></textarea>
            </div>

            <div class="full">
              <label for="scenario">场景 scenario</label>
              <textarea id="scenario" placeholder="角色与用户相遇的背景、世界状态..."></textarea>
            </div>

            <div class="full">
              <label for="firstMes">首句 first_mes</label>
              <textarea id="firstMes" placeholder="角色第一次出场说的话"></textarea>
            </div>

            <div class="full">
              <label for="mesExample">示例对话 mes_example</label>
              <textarea id="mesExample" placeholder="<START>
{{char}}: ...
{{user}}: ...
{{char}}: ..."></textarea>
            </div>

            <div class="full">
              <label for="creatorNotes">创作者备注 creator_notes</label>
              <textarea id="creatorNotes" placeholder="写作重点、禁忌、额外说明"></textarea>
            </div>

            <div class="full">
              <label for="definition">definition（留空则自动拼接）</label>
              <textarea id="definition" placeholder="高级兼容字段，可留空"></textarea>
            </div>

            <div class="full">
              <label for="avatarUpload">角色卡图片上传</label>
              <input id="avatarUpload" type="file" accept="image/*" />
            </div>

            <div>
              <label for="themeColor">主题色</label>
              <input id="themeColor" type="color" value="#6f86ff" />
            </div>

            <div>
              <label for="themeColor2">副色</label>
              <input id="themeColor2" type="color" value="#9b5cff" />
            </div>

            <div class="full">
              <label for="alternateGreetings">备用问候（用 | 分隔）</label>
              <input id="alternateGreetings" placeholder="你好。| 又见面了。| 这么晚还来？" />
            </div>
          </div>
        </div>
      </section>

      <section class="panel preview-panel">
        <div class="panel-header">
          <div>
            <h2>卡面预览</h2>
            <p>导出普通卡面 PNG，或导出嵌入角色 JSON 的 PNG 角色卡。</p>
          </div>
        </div>

        <div class="panel-body">
          <div id="cardPreview" class="card-preview">
            <div class="card-bg"></div>
            <div class="card-content">
              <div class="avatar-box">
                <img id="previewAvatar" alt="avatar" />
              </div>

              <div class="card-meta">
                <div class="card-title-row">
                  <h3 id="previewName">未命名角色</h3>
                  <span id="previewVersion" class="badge">v1.0</span>
                </div>

                <div id="previewSummary" class="summary">
                  一句话简介会显示在这里。
                </div>

                <div id="previewTags" class="tags"></div>

                <div class="sections">
                  <div class="section">
                    <div class="section-title">描述</div>
                    <div id="previewDescription" class="section-body"></div>
                  </div>

                  <div class="section">
                    <div class="section-title">人格</div>
                    <div id="previewPersonality" class="section-body"></div>
                  </div>

                  <div class="section">
                    <div class="section-title">场景</div>
                    <div id="previewScenario" class="section-body"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <canvas id="exportCanvas" width="1200" height="1600" hidden></canvas>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>JSON 预览</h2>
            <p>导出 Tavern Character Card 风格 JSON。</p>
          </div>
          <div class="header-actions">
            <button class="secondary" id="copyJsonBtn">复制 JSON</button>
          </div>
        </div>

        <pre id="jsonPreview" class="json-preview">{}</pre>
      </section>
    </main>
  </div>

  <script src="./utils.js"></script>
  <script src="./storage.js"></script>
  <script src="./card-data.js"></script>
  <script src="./png-card.js"></script>
  <script src="./api.js"></script>
  <script src="./app.js"></script>
</body>
</html>
